<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript Functions</title>
</head>
<body>
    <h1 id="re"></h1>
    <button onclick="product(23,6)"> click to get 23*6</button>
    <button onclick="product(23,59)"> click to get 23*59</button>
    <button onclick="product(23,89)"> click to get 23*89</button>
   
    
    <script>
        
        function product(a,b){ 
         document.getElementById("re").innerHTML = a*b;}
        
    </script>
    
</body>
</html>
